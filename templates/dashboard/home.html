{% extends 'dashboard/base_dashboard.html' %}

{% block page_title %}Resumen{% endblock %}

{% block content %}
<h1 style="color: var(--text-dark); margin-bottom: 1.5rem; font-size: 1.5rem;">Resumen de la Tienda</h1>

<div class="stat-cards">
    <div class="stat-card">
        <div class="stat-card-icon yellow">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
        </div>
        <div class="stat-card-info">
            <div class="stat-card-value">{{ pending_orders }}</div>
            <div class="stat-card-label">Pedidos Pendientes</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-card-icon blue">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        </div>
        <div class="stat-card-info">
            <div class="stat-card-value">{{ total_products }}</div>
            <div class="stat-card-label">Total Productos</div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-card-icon red">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div class="stat-card-info">
            <div class="stat-card-value">{{ low_stock }}</div>
            <div class="stat-card-label">Alertas Stock Bajo</div>
        </div>
    </div>
</div>

<div style="margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
    <a href="{% url 'dashboard:product_create' %}" class="btn btn-dashboard-primary">+ Añadir Producto</a>
    <a href="{% url 'dashboard:order_list' %}" class="btn btn-dashboard-success">Ver Pedidos</a>
</div>
{% endblock %}
