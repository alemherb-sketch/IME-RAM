databases:
  - name: grupo-coinp-db
    plan: free
    databaseName: coinp
    user: coinp_user

services:
  - type: web
    name: ime-ram-web
    plan: starter
    env: python
    buildCommand: "./build.sh"
    # seed_media copies committed seed images onto the persistent disk (idempotent)
    # before the app starts; user uploads on the disk are preserved.
    startCommand: "python manage.py seed_media && gunicorn backend.wsgi:application"
    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grupo-coinp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      # Persistent disk mount -> user-uploaded media survives deploys/restarts
      - key: MEDIA_ROOT
        value: /var/data/media
