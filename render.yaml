databases:
  - name: grupo-coinp-db
    plan: free
    databaseName: coinp
    user: coinp_user

services:
  - type: web
    name: ime-ram-web
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grupo-coinp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
