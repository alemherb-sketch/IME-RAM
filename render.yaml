databases:
  - name: ime-ram-db
    plan: free
    databaseName: imeram
    user: imeram_user

services:
  - type: web
    name: ime-ram-web
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ime-ram-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
